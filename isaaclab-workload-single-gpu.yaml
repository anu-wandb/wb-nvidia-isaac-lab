apiVersion: v1
kind: ConfigMap
metadata:
  name: isaaclab-single-gpu-launch
data:
  launch.sh: |
    #!/bin/bash
    set -euo pipefail

    : "${ISAAC_TASK:=Isaac-Dexsuite-Kuka-Allegro-Lift-v0}"
    if [[ -z "${RUN_TAG:-}" ]]; then
      export RUN_TAG="$(date -u +"%y%m-%H%M")"
    fi
    export WANDB_NAME="${WANDB_NAME:-dexsuite-train-lift-${RUN_TAG}}"
    export WANDB_RUN_ID="${WANDB_RUN_ID:-${WANDB_NAME}}"
    export WANDB_DISABLE_GYM="${WANDB_DISABLE_GYM:-true}"
    export WANDB_GYM_DISABLE="${WANDB_GYM_DISABLE:-${WANDB_DISABLE_GYM}}"
    export WANDB_GYM="${WANDB_GYM:-false}"

    cd /workspace/isaaclab
    export WANDB_DISABLE_GYM="${WANDB_DISABLE_GYM}"
    export WANDB_GYM_DISABLE="${WANDB_GYM_DISABLE}"
    export WANDB_GYM="${WANDB_GYM}"

    ISAAC_PY="/workspace/isaaclab/_isaac_sim/python.sh"
    if [[ ! -x "${ISAAC_PY}" ]]; then
      echo "FATAL: ${ISAAC_PY} not found or not executable" >&2
      exit 1
    fi

    "${ISAAC_PY}" -m pip install --no-cache-dir --no-deps -q "wandb==0.22.2" "imageio-ffmpeg==0.4.9"
    "${ISAAC_PY}" -m pip install --no-cache-dir --no-deps -q "gymnasium==0.29.1"
    rm -f /dev/shm/sem.carbonite-sharedmemory || true
    rm -rf /dev/shm/nccl-* /dev/shm/omni* || true

    "${ISAAC_PY}" - <<'PYCODE'
    import importlib
    import types

    try:
        wandb_gym = importlib.import_module("wandb.integration.gym")
    except Exception:
        wandb_gym = None

    if wandb_gym is not None:
        record_cls = getattr(wandb_gym, "RecordVideo", None)
        if isinstance(record_cls, type):
            if not hasattr(record_cls, "enabled"):
                record_cls.enabled = True
            orig_init = getattr(record_cls, "__init__", None)
            if callable(orig_init):
                def patched_init(self, *args, _orig_init=orig_init, **kwargs):
                    _orig_init(self, *args, **kwargs)
                    if not hasattr(self, "enabled"):
                        self.enabled = True
                record_cls.__init__ = patched_init
    PYCODE

    ./isaaclab.sh -p \
      scripts/reinforcement_learning/rl_games/train.py \
        --task="${ISAAC_TASK}" \
        --headless \
        --enable_cameras \
        --video \
        --track \
        --wandb-entity="${WANDB_ENTITY}" \
        --wandb-project-name="${WANDB_PROJECT}" \
        --wandb-name="${WANDB_NAME}" \
        --max_iterations=1500 \
        --num_envs=8192

    ISAAC_LOG_ROOT="/workspace/isaaclab/logs" "${ISAAC_PY}" - <<'PYCODE'
    import os
    import pathlib
    import sys
    import time
    import traceback
    import wandb

    root = pathlib.Path(os.environ.get("ISAAC_LOG_ROOT", "/workspace/isaaclab/logs"))
    entity = os.environ.get("WANDB_ENTITY", "wandb-smle")
    project = os.environ.get("WANDB_PROJECT", "isaaclab-wandb-crwv")
    run_name = os.environ.get(
        "WANDB_NAME",
        f'single-gpu-job-{int(time.time())}',
    )
    run_id = os.environ.get("WANDB_RUN_ID") or run_name

    def gather_paths(patterns):
        results = []
        for pattern in patterns:
            for path in root.glob(pattern):
                if path.is_file():
                    results.append(path.resolve())
        return results

    def dedupe_preserve_order(paths):
        seen = set()
        ordered = []
        for path in paths:
            if path not in seen:
                seen.add(path)
                ordered.append(path)
        return ordered

    try:
        checkpoint_patterns = (
            "**/*best*.pt",
            "**/*best*.pth",
            "**/*checkpoint*.pt",
            "**/*checkpoint*.pth",
            "**/nn/**/*.pt",
            "**/nn/**/*.pth",
            "**/nn/**/*.onnx",
        )
        checkpoints = gather_paths(checkpoint_patterns)
        checkpoints.sort(key=lambda p: p.stat().st_mtime)
        checkpoints = dedupe_preserve_order(checkpoints)
        best_model = checkpoints[-1] if checkpoints else None

        video_patterns = ("**/videos/**/*.mp4", "**/videos/**/*.gif")
        video_paths = sorted(gather_paths(video_patterns), key=lambda p: p.stat().st_mtime)

        if not checkpoints and not video_paths:
            print("[W&B upload] nothing to upload (no checkpoints/models or videos found)")
        else:
            init_kwargs = {
                "entity": entity,
                "project": project,
                "id": run_id,
                "name": run_name,
                "resume": "allow",
                "job_type": os.environ.get("WANDB_JOB_TYPE", "train-single-gpu"),
            }
            run = wandb.init(**init_kwargs)

            if checkpoints:
                model_art = wandb.Artifact(
                    f"{run_name}-checkpoints",
                    type="model",
                    metadata={"count": len(checkpoints), "source": "isaaclab"},
                )
                rel_paths = {}
                for path in checkpoints:
                    try:
                        rel = str(path.relative_to(root))
                    except ValueError:
                        rel = path.name
                    rel_paths[path] = rel
                    model_art.add_file(str(path), name=rel)
                logged_art = run.log_artifact(model_art)
                logged_art.wait()
                if best_model:
                    run.summary["best_checkpoint"] = rel_paths[best_model]
                    run.summary["best_checkpoint_mtime"] = best_model.stat().st_mtime
                print(f"[W&B upload] logged {len(checkpoints)} checkpoint/model files")

            if video_paths:
                video_art = wandb.Artifact(f"{run_name}-videos", type="video", metadata={"count": len(video_paths)})
                for path in video_paths:
                    try:
                        rel = str(path.relative_to(root))
                    except ValueError:
                        rel = path.name
                    video_art.add_file(str(path), name=rel)
                run.log_artifact(video_art).wait()
                for path in video_paths:
                    run.log({"sim_video": wandb.Video(str(path), caption=path.name)})
                print(f"[W&B upload] logged {len(video_paths)} video files")

            run.finish()
    except Exception as exc:
        print(f"[W&B upload] failed: {exc}", file=sys.stderr)
        traceback.print_exc()
    PYCODE
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: isaaclab-single-gpu-logs-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 400Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: isaaclab-single-gpu
spec:
  replicas: 1
  selector:
    matchLabels:
      app: isaaclab-single-gpu
  template:
    metadata:
      labels:
        app: isaaclab-single-gpu
    spec:
      volumes:
        - name: launch-script
          configMap:
            name: isaaclab-single-gpu-launch
            defaultMode: 0755
        - name: isaac-logs
          persistentVolumeClaim:
            claimName: isaaclab-single-gpu-logs-pvc
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 16Gi
      containers:
        - name: isaaclab
          image: nvcr.io/nvidia/isaac-lab:2.3.2
          command:
            - /bin/bash
            - /workspace/launch.sh
          env:
            - name: ISAAC_TASK
              value: Isaac-Dexsuite-Kuka-Allegro-Lift-v0
            - name: WANDB_ENTITY
              value: wandb-smle
            - name: WANDB_PROJECT
              value: isaaclab-wandb-crwv
            - name: WANDB_API_KEY
              valueFrom:
                secretKeyRef:
                  name: wandb-api-key
                  key: WANDB_API_KEY
            - name: OMNI_KIT_ACCEPT_EULA
              value: "YES"
            - name: ACCEPT_EULA
              value: "Y"
            - name: PRIVACY_CONSENT
              value: "Y"
            - name: OMNI_KIT_DISABLE_PIP_INSTALL
              value: "1"
            - name: WANDB_DISABLE_GYM
              value: "true"
            - name: WANDB_GYM_DISABLE
              value: "true"
            - name: WANDB_GYM
              value: "false"
          volumeMounts:
            - name: launch-script
              mountPath: /workspace/launch.sh
              subPath: launch.sh
            - name: isaac-logs
              mountPath: /workspace/isaaclab/logs
            - name: shm
              mountPath: /dev/shm
          resources:
            limits:
              nvidia.com/gpu: 1
              cpu: "12"
              memory: 48Gi
            requests:
              nvidia.com/gpu: 1
              cpu: "6"
              memory: 24Gi
